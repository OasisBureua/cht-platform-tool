name: Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: true
        type: string
      deploy_us_east_2:
        description: 'Deploy to us-east-2 (failover)'
        required: false
        default: false
        type: boolean

env:
  TERRAFORM_VERSION: 1.6.0
  ECR_REGISTRY: 233636046512.dkr.ecr.us-east-1.amazonaws.com

permissions:
  id-token: write   # Required for OIDC
  contents: read

jobs:
  deploy-us-east-1:
    name: Deploy to us-east-1 (Primary)
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=${{ inputs.version }}
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/cht-platform-backend:${{ steps.version.outputs.version }}
            ${{ env.ECR_REGISTRY }}/cht-platform-backend:prod-latest

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/cht-platform-worker:${{ steps.version.outputs.version }}
            ${{ env.ECR_REGISTRY }}/cht-platform-worker:prod-latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Deploy us-east-1
        working-directory: infrastructure/terraform/environments/us-east-1
        run: |
          terraform init
          terraform apply \
            -var-file="../variables/prod.tfvars" \
            -var="backend_image=${{ env.ECR_REGISTRY }}/cht-platform-backend:${{ steps.version.outputs.version }}" \
            -var="worker_image=${{ env.ECR_REGISTRY }}/cht-platform-worker:${{ steps.version.outputs.version }}" \
            -auto-approve
        env:
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN_US_EAST_1 }}
          TF_VAR_cloudfront_certificate_arn: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN_US_EAST_1 }}
          TF_VAR_auth0_domain: ${{ secrets.AUTH0_DOMAIN }}
          TF_VAR_auth0_client_id: ${{ secrets.AUTH0_CLIENT_ID }}
          TF_VAR_auth0_audience: ${{ secrets.AUTH0_AUDIENCE }}
          TF_VAR_stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          TF_VAR_stripe_publishable_key: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          TF_VAR_stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          TF_VAR_hubspot_smtp_user: ${{ secrets.HUBSPOT_SMTP_USER }}
          TF_VAR_hubspot_smtp_password: ${{ secrets.HUBSPOT_SMTP_PASSWORD }}
          TF_VAR_sns_topic_arn: ${{ secrets.SNS_TOPIC_ARN }}

      - name: Get Terraform outputs
        id: outputs
        working-directory: infrastructure/terraform/environments/us-east-1
        run: |
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Deploy Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: https://api.communityhealth.media/api
          VITE_AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          VITE_AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}

      - name: Upload to S3
        working-directory: ./frontend
        run: |
          aws s3 sync dist/ s3://${{ steps.outputs.outputs.frontend_bucket }}/ --delete
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.cloudfront_id }} \
            --paths "/*"

      - name: Health Check
        run: |
          sleep 60
          curl -f https://api.communityhealth.media/health/ready || exit 1
          echo "✅ us-east-1 deployment successful!"

  deploy-us-east-2:
    name: Deploy to us-east-2 (Failover)
    runs-on: ubuntu-latest
    needs: deploy-us-east-1
    if: inputs.deploy_us_east_2 == true
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Deploy us-east-2
        working-directory: infrastructure/terraform/environments/us-east-2-standby
        run: |
          terraform init
          terraform apply \
            -var-file="../variables/prod.tfvars" \
            -auto-approve
        env:
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN_US_EAST_2 }}
          TF_VAR_cloudfront_certificate_arn: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN_US_EAST_1 }}

      - name: Notify
        run: |
          echo "✅ us-east-2 failover region deployed!"
