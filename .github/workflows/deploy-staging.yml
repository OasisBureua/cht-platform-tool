name: Deploy to Staging

on:
  push:
    branches:
      - staging
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 233636046512.dkr.ecr.us-east-1.amazonaws.com
  TERRAFORM_VERSION: 1.9.8

permissions:
  id-token: write   # Required for OIDC
  contents: read

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_TAG="staging-${SHORT_SHA}-$(date +%s)"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Building with tag: ${IMAGE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/cht-platform-backend:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/cht-platform-backend:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/cht-platform-worker:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/cht-platform-worker:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/us-east-1-staging
        run: terraform init

      - name: Terraform Apply
        working-directory: infrastructure/terraform/environments/us-east-1-staging
        run: |
          terraform apply \
            -var-file="../variables/staging.tfvars" \
            -var="backend_image=${{ env.ECR_REGISTRY }}/cht-platform-backend:${{ steps.meta.outputs.image_tag }}" \
            -var="worker_image=${{ env.ECR_REGISTRY }}/cht-platform-worker:${{ steps.meta.outputs.image_tag }}" \
            -auto-approve
        env:
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
          TF_VAR_cloudfront_certificate_arn: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN }}
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
          TF_VAR_supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY }}
          TF_VAR_gotrue_jwt_secret: ${{ secrets.GOTRUE_JWT_SECRET }}
          TF_VAR_mediahub_api_key: ${{ secrets.MEDIAHUB_API_KEY }}
          TF_VAR_youtube_api_key: ${{ secrets.YOUTUBE_API_KEY }}
          TF_VAR_youtube_playlist_ids: ${{ secrets.YOUTUBE_PLAYLIST_IDS }}
          TF_VAR_zoom_account_id: ${{ secrets.ZOOM_ACCOUNT_ID }}
          TF_VAR_zoom_client_id: ${{ secrets.ZOOM_CLIENT_ID }}
          TF_VAR_zoom_client_secret: ${{ secrets.ZOOM_CLIENT_SECRET }}
          TF_VAR_zoom_webhook_secret: ${{ secrets.ZOOM_WEBHOOK_SECRET }}
          TF_VAR_jotform_api_key: ${{ secrets.JOTFORM_API_KEY }}
          TF_VAR_bill_dev_key: ${{ secrets.BILL_DEV_KEY }}
          TF_VAR_bill_username: ${{ secrets.BILL_USERNAME }}
          TF_VAR_bill_password: ${{ secrets.BILL_PASSWORD }}
          TF_VAR_bill_org_id: ${{ secrets.BILL_ORG_ID }}
          TF_VAR_bill_funding_account_id: ${{ secrets.BILL_FUNDING_ACCOUNT_ID }}
          TF_VAR_bill_webhook_secret: ${{ secrets.BILL_WEBHOOK_SECRET }}
          TF_VAR_admin_bootstrap_secret: ${{ secrets.ADMIN_BOOTSTRAP_SECRET }}
          TF_VAR_hubspot_access_token: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}

      - name: Get Terraform outputs
        id: outputs
        working-directory: infrastructure/terraform/environments/us-east-1-staging
        run: |
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT

      - name: Print Route53 nameservers (for GoDaddy NS delegation)
        working-directory: infrastructure/terraform/environments/us-east-1-staging
        run: |
          echo "================================================================"
          echo "  ROUTE 53 NAMESERVERS FOR staging.testapp.communityhealth.media"
          echo "  Add these as NS records on the testapp.communityhealth.media"
          echo "  zone in GoDaddy (Type: NS, Name: staging, TTL: 300)"
          echo "================================================================"
          terraform output -json route53_nameservers | jq -r '.[]'
          echo "================================================================"

      - name: Print direct AWS URLs (for testing without DNS delegation)
        working-directory: infrastructure/terraform/environments/us-east-1-staging
        run: |
          echo "================================================================"
          echo "  DIRECT AWS URLs (use until DNS delegates)"
          echo "================================================================"
          echo "ALB DNS:        $(terraform output -raw alb_dns_name)"
          echo "CloudFront URL: https://$(terraform output -raw cloudfront_domain_name)"
          echo "Frontend bucket: $(terraform output -raw frontend_bucket)"
          echo "================================================================"

      - name: Delegate staging zone in parent (testapp.communityhealth.media → AWS Route53)
        working-directory: infrastructure/terraform/environments/us-east-1-staging
        run: |
          set -e
          echo "================================================================"
          echo "  DELEGATING staging.testapp.communityhealth.media"
          echo "  (adding NS records in parent testapp.communityhealth.media zone)"
          echo "================================================================"

          # 1. Find the parent zone (testapp.communityhealth.media)
          PARENT_ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name testapp.communityhealth.media \
            --max-items 5 \
            --query 'HostedZones[?Name==`testapp.communityhealth.media.` && Config.PrivateZone==`false`].Id' \
            --output text | sed 's|/hostedzone/||')

          if [ -z "$PARENT_ZONE_ID" ]; then
            echo "❌ Could not find public hosted zone for testapp.communityhealth.media"
            exit 1
          fi
          echo "Parent zone ID: $PARENT_ZONE_ID"

          # 2. Get staging zone nameservers from terraform output
          STAGING_NS=$(terraform output -json route53_nameservers | jq -r '.[]')
          echo "Staging nameservers:"
          echo "$STAGING_NS"

          # 3. Build ResourceRecords JSON
          RR_JSON=$(echo "$STAGING_NS" | jq -R '.' | jq -s '[.[] | {"Value": .}]')

          # 4. Submit UPSERT change
          CHANGE_BATCH=$(jq -n --argjson rr "$RR_JSON" '{
            "Comment": "Delegate staging.testapp to AWS Route53 staging zone",
            "Changes": [{
              "Action": "UPSERT",
              "ResourceRecordSet": {
                "Name": "staging.testapp.communityhealth.media",
                "Type": "NS",
                "TTL": 300,
                "ResourceRecords": $rr
              }
            }]
          }')

          echo ""
          echo "Submitting change..."
          CHANGE_ID=$(aws route53 change-resource-record-sets \
            --hosted-zone-id "$PARENT_ZONE_ID" \
            --change-batch "$CHANGE_BATCH" \
            --query 'ChangeInfo.Id' --output text)

          echo "✓ Change submitted: $CHANGE_ID"
          echo ""
          echo "Propagation typically completes in 5-30 min."
          echo "Verify with: dig +short NS staging.testapp.communityhealth.media @8.8.8.8"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: https://staging.testapp.communityhealth.media/api
          VITE_APP_URL: https://staging.testapp.communityhealth.media
          VITE_SUPABASE_URL: https://mediahub.communityhealth.media
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload to S3
        working-directory: ./frontend
        run: |
          aws s3 sync dist/ s3://${{ steps.outputs.outputs.frontend_bucket }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          aws s3 cp dist/index.html s3://${{ steps.outputs.outputs.frontend_bucket }}/index.html \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.cloudfront_id }} \
            --paths "/*"

      - name: Health Check (via ALB direct, since DNS not yet delegated)
        id: healthcheck
        continue-on-error: true
        run: |
          ALB_DNS=$(cd infrastructure/terraform/environments/us-east-1-staging && terraform output -raw alb_dns_name)
          echo "Waiting for deployment to stabilize..."
          sleep 30
          curl -fsk "https://${ALB_DNS}/health/ready" && echo "✅ ALB direct health check passed!" || echo "❌ ALB direct health check failed"
          curl -fsk "https://${ALB_DNS}/health" && echo "✅ ALB /health passed!" || echo "❌ ALB /health failed"

      - name: Diagnostics — ECS task statuses
        if: always()
        run: |
          CLUSTER="cht-platform-staging-cluster"
          echo "================================================================"
          echo "  ECS SERVICES"
          echo "================================================================"
          aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services cht-platform-staging-backend cht-platform-staging-worker \
            --query 'services[*].[serviceName,status,desiredCount,runningCount,pendingCount,events[0:3].message]' \
            --output text 2>&1 || echo "describe-services failed"

          echo ""
          echo "================================================================"
          echo "  RUNNING / STOPPED TASKS"
          echo "================================================================"
          aws ecs list-tasks --cluster "$CLUSTER" --desired-status RUNNING --output text 2>&1 || true
          aws ecs list-tasks --cluster "$CLUSTER" --desired-status STOPPED --output text 2>&1 | head -10 || true

          echo ""
          echo "================================================================"
          echo "  STOPPED TASK DETAILS (most recent)"
          echo "================================================================"
          STOPPED=$(aws ecs list-tasks --cluster "$CLUSTER" --desired-status STOPPED --query 'taskArns[0]' --output text 2>/dev/null || echo "")
          if [ -n "$STOPPED" ] && [ "$STOPPED" != "None" ]; then
            aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$STOPPED" \
              --query 'tasks[*].[lastStatus,stoppedReason,containers[*].[name,exitCode,reason]]' \
              --output text 2>&1 || true
          else
            echo "(no stopped tasks)"
          fi

      - name: Diagnostics — recent ECS logs
        if: always()
        run: |
          echo "================================================================"
          echo "  AVAILABLE LOG GROUPS (cht-platform-staging-*)"
          echo "================================================================"
          aws logs describe-log-groups --log-group-name-prefix "/ecs/cht-platform-staging" \
            --query 'logGroups[*].[logGroupName,storedBytes]' --output text 2>&1 | head -10

          echo ""
          echo "================================================================"
          echo "  RECENT LOGS — /ecs/cht-platform-staging (last 5 min)"
          echo "================================================================"
          LOG_GROUP="/ecs/cht-platform-staging"
          aws logs filter-log-events \
            --log-group-name "$LOG_GROUP" \
            --start-time $(( $(date +%s) * 1000 - 300000 )) \
            --max-items 60 \
            --query 'events[*].[timestamp,message]' \
            --output text 2>&1 | tail -80 || echo "(no logs in $LOG_GROUP)"

          echo ""
          echo "================================================================"
          echo "  LOG STREAMS in $LOG_GROUP (most recent 10)"
          echo "================================================================"
          aws logs describe-log-streams --log-group-name "$LOG_GROUP" \
            --order-by LastEventTime --descending --max-items 10 \
            --query 'logStreams[*].[logStreamName,lastEventTimestamp]' --output text 2>&1 | head -15 || true

      - name: Final health gate
        if: steps.healthcheck.outcome == 'failure'
        run: |
          echo "Health check failed — diagnostics above. Marking workflow failed."
          exit 1

      - name: Deployment Summary
        run: |
          echo "🎉 Staging Deployment Complete!"
          echo ""
          echo "Frontend: https://staging.testapp.communityhealth.media"
          echo "API:      https://staging.testapp.communityhealth.media/api"
          echo "Image Tag: ${{ steps.meta.outputs.image_tag }}"
