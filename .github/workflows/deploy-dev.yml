name: Deploy to Development

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 233636046512.dkr.ecr.us-east-1.amazonaws.com
  TERRAFORM_VERSION: 1.6.0

permissions:
  id-token: write   # Required for OIDC
  contents: read

jobs:
  deploy:
    name: Deploy to Development
    runs-on: ubuntu-latest
    environment: development
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_TAG="dev-${SHORT_SHA}-$(date +%s)"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Building with tag: ${IMAGE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/cht-platform-backend:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/cht-platform-backend:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/cht-platform-worker:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/cht-platform-worker:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/us-east-1
        run: terraform init

      - name: Terraform Apply
        working-directory: infrastructure/terraform/environments/us-east-1
        run: |
          terraform apply \
            -var-file="../variables/dev.tfvars" \
            -var="backend_image=${{ env.ECR_REGISTRY }}/cht-platform-backend:${{ steps.meta.outputs.image_tag }}" \
            -var="worker_image=${{ env.ECR_REGISTRY }}/cht-platform-worker:${{ steps.meta.outputs.image_tag }}" \
            -auto-approve
        env:
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
          TF_VAR_cloudfront_certificate_arn: ${{ secrets.CLOUDFRONT_CERTIFICATE_ARN }}
          TF_VAR_auth0_domain: ${{ secrets.AUTH0_DOMAIN }}
          TF_VAR_auth0_client_id: ${{ secrets.AUTH0_CLIENT_ID }}
          TF_VAR_auth0_audience: ${{ secrets.AUTH0_AUDIENCE }}
          TF_VAR_stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          TF_VAR_stripe_publishable_key: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          TF_VAR_stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          TF_VAR_zoom_account_id: ${{ secrets.ZOOM_ACCOUNT_ID }}
          TF_VAR_zoom_client_id: ${{ secrets.ZOOM_CLIENT_ID }}
          TF_VAR_zoom_client_secret: ${{ secrets.ZOOM_CLIENT_SECRET }}

      - name: Get Terraform outputs
        id: outputs
        working-directory: infrastructure/terraform/environments/us-east-1
        run: |
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: https://api.communityhealth.media/api
          VITE_APP_URL: https://testapp.communityhealth.media
          VITE_AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          VITE_AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}

      - name: Upload to S3
        working-directory: ./frontend
        run: |
          aws s3 sync dist/ s3://${{ steps.outputs.outputs.frontend_bucket }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          
          aws s3 cp dist/index.html s3://${{ steps.outputs.outputs.frontend_bucket }}/index.html \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.cloudfront_id }} \
            --paths "/*"

      - name: Health Check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          
          curl -f https://api.communityhealth.media/health/ready || exit 1
          echo "✅ Development deployment successful!"

      - name: Deployment Summary
        run: |
          echo "🎉 Deployment Complete!"
          echo ""
          echo "Frontend: https://testapp.communityhealth.media"
          echo "Backend: https://api.communityhealth.media"
          echo "Image Tag: ${{ steps.meta.outputs.image_tag }}"
